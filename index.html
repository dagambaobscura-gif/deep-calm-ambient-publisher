<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deep Calm Ambient Publisher</title>
  <meta name="description" content="Official publishing console for Deep Calm Ambient.">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#edf0ef;color:#11191d;font:15px Arial,sans-serif;letter-spacing:0}.top{min-height:76px;padding:14px clamp(20px,5vw,72px);display:flex;align-items:center;justify-content:space-between;gap:20px;color:#f5f0e8;background:#1a3a4a;border-bottom:3px solid #b8935a}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.mark{width:44px;height:44px;display:grid;place-items:center;border:1px solid #b7ccd3;border-radius:50%;font:bold 24px Georgia}.brand strong,.brand small{display:block}.brand strong{font:700 17px Georgia}.brand small{margin-top:2px;color:#b7ccd3;font-size:12px}.status{font-size:13px}.status:before{content:"";display:inline-block;width:8px;height:8px;margin-right:8px;border-radius:50%;background:#b8935a}.wrap{width:min(1120px,calc(100% - 40px));margin:42px auto}.head{display:flex;justify-content:space-between;align-items:end;gap:24px;padding-bottom:20px;border-bottom:1px solid #aeb7b7}.eyebrow{margin:0 0 8px;color:#4a5a61;font-size:12px;font-weight:bold;text-transform:uppercase}h1{margin:0;font:700 clamp(28px,4vw,44px) Georgia}.connect,.publish{min-height:44px;padding:0 18px;border:0;border-radius:4px;color:white;background:#1a3a4a;font-weight:bold}.connect:disabled,.publish:disabled{opacity:.48}.grid{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(300px,.8fr);gap:34px;padding-top:30px}.media{aspect-ratio:16/10;min-height:430px;display:grid;place-items:center;overflow:hidden;background:#d9dfdd;border:1px solid #bdc5c3;border-radius:6px}.drop{width:calc(100% - 42px);height:calc(100% - 42px);display:grid;place-content:center;justify-items:center;gap:9px;color:#40525a;border:1px dashed #78909a;cursor:pointer}.drop input{position:absolute;opacity:0}.plus{width:42px;height:42px;display:grid;place-items:center;margin-bottom:5px;color:#f5f0e8;background:#1a3a4a;border-radius:50%;font-size:28px}.preview{width:100%;height:100%;object-fit:contain;background:#0e0b08}.details{display:flex;flex-direction:column}.details label{margin-bottom:8px;font-weight:bold}textarea{width:100%;min-height:172px;padding:14px;border:1px solid #9aa7a8;border-radius:4px;resize:vertical}.counter{margin:7px 0 20px;text-align:right;color:#647276;font-size:12px}.row{min-height:48px;display:flex;align-items:center;justify-content:space-between;gap:16px;border-top:1px solid #d7d9d6;font-size:13px}.row strong{color:#40525a}.publish{margin-top:22px}.notice{color:#657276;font-size:12px;line-height:1.5}footer{width:min(1120px,calc(100% - 40px));margin:auto;padding:22px 0 34px;display:flex;justify-content:space-between;gap:20px;color:#536267;border-top:1px solid #c9cfcd;font-size:12px}footer nav{display:flex;gap:20px}footer a{color:inherit}@media(max-width:760px){.status{font-size:0}.grid{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}.media{min-height:360px}footer{flex-direction:column}}
  </style>
</head>
<body>
  <header class="top"><a class="brand" href="./"><span class="mark">D</span><span><strong>Deep Calm Ambient</strong><small>Publishing Console</small></span></a><span class="status">TikTok connection pending</span></header>
  <main class="wrap"><section class="head"><div><p class="eyebrow">Content Posting</p><h1>Prepare a TikTok post</h1></div><button class="connect" disabled>Connect TikTok</button></section>
    <div class="grid"><div class="media" id="media"><label class="drop"><span class="plus">+</span><strong>Select a vertical video</strong><span>MP4 or MOV, ready for TikTok</span><input id="file" type="file" accept="video/mp4,video/quicktime"></label></div>
      <form class="details" onsubmit="return false"><label for="caption">Caption</label><textarea id="caption" maxlength="2200" placeholder="Write the post caption and hashtags"></textarea><div class="counter"><span id="count">0</span> / 2200</div><div class="row"><span>Audience</span><strong>Public</strong></div><div class="row"><span>AI content label</span><strong>Set during publishing</strong></div><button class="publish" disabled>Continue to TikTok</button><p class="notice">Publishing becomes available after TikTok approves the application.</p></form></div>
  </main>
  <footer><span>Deep Calm Ambient Publisher</span><nav><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Service</a></nav></footer>
  <script>const f=document.querySelector('#file'),m=document.querySelector('#media'),c=document.querySelector('#caption'),n=document.querySelector('#count');c.addEventListener('input',()=>n.textContent=c.value.length);f.addEventListener('change',()=>{if(!f.files[0])return;const v=document.createElement('video');v.className='preview';v.controls=true;v.playsInline=true;v.src=URL.createObjectURL(f.files[0]);m.replaceChildren(v)});</script>
</body></html>
